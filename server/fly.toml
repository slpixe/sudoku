app = "sudoku-multiplayer"
primary_region = "lhr"

[build]
  dockerfile = "server/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  ROOM_TTL_HOURS = "24"
  RECONNECT_GRACE_SECONDS = "60"
  ALLOWED_ORIGINS = "https://sudoku.slpixe.com"

[deploy]
  release_command = "node server/dist/db/migrate.js"
  # Presence and per-room command queues are process-local. Replace the single
  # Machine without a rolling overlap until those services are distributed.
  strategy = "immediate"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  # Presence and per-room queues are process-local. Deployment MUST use
  # `pnpm run deploy:multiplayer`, which disables HA creation and resets the
  # app to exactly one Machine after every deploy.
  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "2s"

  # Readiness also verifies that the authoritative Postgres store is reachable.
  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    path = "/ready"
    protocol = "http"
    timeout = "2s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
